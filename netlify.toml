[build]
  publish = "_site"
  command = "pnpm build"
  
[build.environment]
  NODE_VERSION = "24"

# Build plugins
[[plugins]]
  package = "@netlify/plugin-lighthouse"

  [plugins.inputs.thresholds]
    performance = 0.9
    accessibility = 0.9
    best-practices = 0.9
    seo = 0.9

[[plugins]]
  package = "netlify-plugin-cache"

  [plugins.inputs]
    paths = [".cache"]

# Functions configuration
[functions]
  node_bundler = "esbuild"
  directory = "netlify/functions/"

# Headers for security and performance
[[headers]]
  for = "/*"
  [headers.values]
    # Changed from DENY to SAMEORIGIN so TinaCMS can load pages within the same domain
    X-Frame-Options = "SAMEORIGIN"
    
    # Added CSP frame-ancestors to explicitly allow your site to frame itself
    Content-Security-Policy = "frame-ancestors 'self' https://web-castanya.netlify.app;"
    
    X-XSS-Protection = "1; mode=block"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Permissions-Policy = "camera=(), microphone=(), geolocation=()"

[[headers]]
  for = "/assets/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/*.css"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/*.js"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/*.woff2"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/admin/*"
  [headers.values]
    X-Robots-Tag = "noindex"

# Redirects and rewrites
[[redirects]]
  from = "/admin"
  to = "/admin/"
  status = 301

[[redirects]]
  from = "/api/*"
  to = "/.netlify/functions/:splat"
  status = 200

[[redirects]]
  from = "/shop/product/:slug"
  to = "/shop/:slug"
  status = 301

# SPA fallback for client-side routing (if needed)
[[redirects]]
  from = "/app/*"
  to = "/app/index.html"
  status = 200

# 404 fallback
[[redirects]]
  from = "/*"
  to = "/404.html"
  status = 404

# Form handling
[forms]
  settings = true

# Edge functions configuration
[[edge_functions]]
  path = "/api/edge/*"
  function = "edge-handler"

# Context-specific settings
[context.production]
  command = "pnpm build"

[context.deploy-preview]
  command = "pnpm build"

[context.branch-deploy]
  command = "pnpm build"

# Development settings
[dev]
  command = "pnpm dev"
  port = 8081
  publish = "_site"
  autoLaunch = false
