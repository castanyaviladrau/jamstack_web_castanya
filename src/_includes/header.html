<header class="site-header">
  <div class="header-top">
    <!-- Left Side: Search -->
    <div class="utility-left">
      <svg class="icon search"><use xlink:href="#search-icon"></use></svg>
    </div>

    <!-- Center: Logo + Text Title -->
    <div class="header-logo">
      <div class="header-logo">
        <a href="/" class="logo-link">
          <img
            src="/assets/images/logo-white.png"
            alt="Castanya de Viladrau"
            class="logo-img logo-img--white"
          />
          <img
            src="/assets/images/logo.png"
            alt=""
            class="logo-img logo-img--color"
            aria-hidden="true"
          />
          <span class="logo-title">Castanya de Viladrau</span>
        </a>
      </div>
    </div>

    <!-- Right Side: Shopping Cart -->
    <div class="utility-right">
      <a class="header-contact-button" href="/contact">CONTACTE</a>
      <a
        class="header-icon-button header-icon-button--cart"
        href="/shop/cart/"
        aria-label="Carret"
      >
        <img
          src="/assets/images/shopping_cart_button.svg"
          alt=""
          class="header-icon-image"
          aria-hidden="true"
        />
        <span class="header-cart-count" data-cart-count hidden>0</span>
      </a>
      <a
        class="header-icon-button header-icon-button--whatsapp"
        href="https://wa.me/34608131199?text=Hola%2C%20m%27interessaria%20fer%20una%20consulta..."
        aria-label="WhatsApp"
      >
        <img
          src="/assets/images/whatsapp_button.png"
          alt=""
          class="header-icon-image header-icon-image--whatsapp"
          aria-hidden="true"
        />
      </a>
      <button
        type="button"
        class="header-menu-toggle"
        aria-expanded="false"
        aria-controls="primary-navigation"
        aria-label="Obrir menu principal"
      >
        <span class="header-menu-toggle__line"></span>
        <span class="header-menu-toggle__line"></span>
        <span class="header-menu-toggle__line"></span>
      </button>
    </div>
  </div>

  <nav class="header-nav" id="primary-navigation">
    <div class="nav-flex-container">
      <div class="header-mobile-panel">
        <div class="header-mobile-actions">
          <a class="header-mobile-actions__link" href="/contact">CONTACTE</a>
        </div>
      </div>
      <ul class="nav-list">
        <li
          class="nav-item {% if '/visits' in page.url %}active{% endif %} has-dropdown nav-item--dropdown nav-item--visits"
        >
          <button
            type="button"
            class="nav-link-button"
            aria-expanded="{% if '/visits' in page.url %}true{% else %}false{% endif %}"
            aria-controls="visits-submenu"
          >
            <span class="nav-btn-text">VISITES<br>GUIADES</span>
            <img class="nav-drop-arrow" src="/assets/images/arrow_vector.svg" alt="" aria-hidden="true">
          </button>
          <div class="nav-dropdown" id="visits-submenu">
            <div class="nav-dropdown__inner">
              <a
                href="/visits/"
                class="nav-dropdown__link {% if page.url == '/visits/' %}is-active{% endif %}"
                >Visites guiades</a
              >
              <a
                href="/visits/parc-natural-del-montseny/"
                class="nav-dropdown__link {% if '/visits/parc-natural-del-montseny/' in page.url %}is-active{% endif %}"
                >Parc natural del Montseny</a
              >
            </div>
          </div>
        </li>
        <li class="nav-item {% if '/fusta' in page.url %}active{% endif %}">
          <a href="/fusta">FUSTA</a>
        </li>
        <li
          class="nav-item {% if '/professionals' in page.url %}active{% endif %}"
        >
          <a href="/professionals">ESPAI<br>PROFESSIONALS</a>
        </li>
        <li
          class="nav-item {% if '/gastronomic' in page.url %}active{% endif %} has-dropdown nav-item--dropdown nav-item--gastronomic"
        >
          <button
            type="button"
            class="nav-link-button"
            aria-expanded="{% if '/gastronomic' in page.url %}true{% else %}false{% endif %}"
            aria-controls="gastronomic-submenu"
          >
            <span class="nav-btn-text">ESPAI<br>GASTRONÒMIC</span>
            <img class="nav-drop-arrow" src="/assets/images/arrow_vector.svg" alt="" aria-hidden="true">
          </button>
          <div class="nav-dropdown" id="gastronomic-submenu">
            <div class="nav-dropdown__inner">
              <a
                href="/gastronomic"
                class="nav-dropdown__link {% if page.url == '/gastronomic/' %}is-active{% endif %}"
                >On menjar la castanya de Viladrau</a
              >
              <a
                href="/gastronomic/valor-nutricionals"
                class="nav-dropdown__link {% if '/gastronomic/valor-nutricionals' in page.url %}is-active{% endif %}"
                >Valors nutricionals</a
              >
              <a
                href="/gastronomic/receptes"
                class="nav-dropdown__link {% if '/gastronomic/receptes' in page.url %}is-active{% endif %}"
                >Receptes</a
              >
            </div>
          </div>
        </li>
        <li class="nav-item {% if '/projecte' in page.url %}active{% endif %}">
          <a href="/projecte">SOBRE EL<br>PROJECTE</a>
        </li>
        <li
          class="nav-item {% if '/trobar-nos' in page.url %}active{% endif %}"
        >
          <a href="/trobar-nos">ON TROBAR-NOS</a>
        </li>
        <li class="nav-item {% if '/blog' in page.url %}active{% endif %}">
          <a href="/blog">ACTUALITAT</a>
        </li>
        <li class="nav-item nav-item--shop {% if '/shop' in page.url %}active{% endif %}">
          <a href="/shop/products">BOTIGA</a>
        </li>
      </ul>
    </div>
  </nav>
</header>

<!-- Fixed top-right overlay for pages where the header sits at the bottom -->
<div class="utility-top-overlay">
  <a class="header-contact-button" href="/contact">CONTACTE</a>
  <a
    class="header-icon-button header-icon-button--cart"
    href="/shop/cart/"
    aria-label="Carret"
  >
    <img
      src="/assets/images/shopping_cart_button.svg"
      alt=""
      class="header-icon-image"
      aria-hidden="true"
    />
    <span class="header-cart-count" data-cart-count hidden>0</span>
  </a>
  <a
    class="header-icon-button header-icon-button--whatsapp"
    href="https://wa.me/34608131199?text=Hola%2C%20m%27interessaria%20fer%20una%20consulta..."
    aria-label="WhatsApp"
  >
    <img
      src="/assets/images/whatsapp_button.png"
      alt=""
      class="header-icon-image header-icon-image--whatsapp"
      aria-hidden="true"
    />
  </a>
</div>
